<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f4f4f4;
    }

    header{
      background:#222;
      color:white;
      padding:20px;
      text-align:center;
    }

    .container{
      padding:40px;
      text-align:center;
    }

    button{
      padding:10px 20px;
      border:none;
      background:blue;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:darkblue;
    }

    #page2{
      display:none;
      text-align:center;
      padding:100px;
    }
  </style>
</head>

<body>

  <!-- PAGE 1 -->

  <div id="page1">

    <header>
      <h1>Welcome to My Website</h1>
    </header>

    <div class="container">
      <h2>Hello 👋</h2>
      <p>This is my first HTML CSS website.</p>

      <button onclick="openPage()">Click Me</button>
    </div>

  </div>

  <!-- PAGE 2 -->

  <div id="page2">
    <h1>New Text Page 🎉</h1>
    <p>Button click pannathuku aprm intha page open aaguthu.</p>
  </div>

  <script>
    function openPage(){
      document.getElementById("page1").style.display = "none";
      document.getElementById("page2").style.display = "block";
    }
  </script>

</body>
</html>
